function Analytics({ students, records, papers }) {
  const allAcc=records.map(r=>{const p=papers.find(x=>x.id===r.paperId)||{total:15};return calcAcc(r.score,p.total)});
  const retakePct=records.length?Math.round(records.filter(r=>r.retake).length/records.length*100):0;

  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const ym=`${d.getFullYear()}-${fmt(d.getMonth()+1)}`;
    const recs=records.filter(r=>r.date.startsWith(ym));
    const ac=recs.map(r=>{const p=papers.find(x=>x.id===r.paperId)||{total:15};return calcAcc(r.score,p.total)});
    months.push({label:`${d.getMonth()+1}월`,cnt:recs.length,avg:avg(ac)||0});
  }
  const typeMap={};records.forEach(r=>{const p=papers.find(x=>x.id===r.paperId);if(!p)return;const t=p.type;if(!typeMap[t])typeMap[t]=[];typeMap[t].push(calcAcc(r.score,p.total))});
  const studentCompar=students.map(s=>{const r=records.filter(x=>x.studentId===s.id);const ac=r.map(x=>{const p=papers.find(y=>y.id===x.paperId)||{total:15};return calcAcc(x.score,p.total)});return{name:s.name,avg:avg(ac),cnt:r.length}}).filter(s=>s.cnt>0).sort((a,b)=>b.avg-a.avg);
  const errMap={};records.forEach(r=>{if(r.errorType)errMap[r.errorType]=(errMap[r.errorType]||0)+1});
  const errE=Object.entries(errMap);
  const typeE=Object.entries(typeMap);

  return (
    <div>
      <div className="ph"><div className="pt">분석</div><div className="ps">전체 데이터 기반 성적 분석</div></div>
      <div className="pb">
        <div className="stat-grid">
          <div className="stat-card"><div className="stat-lbl">전체 평균 정답률</div><div className="stat-val blue">{avg(allAcc)}%</div></div>
          <div className="stat-card"><div className="stat-lbl">총 시험 횟수</div><div className="stat-val">{records.length}</div></div>
          <div className="stat-card"><div className="stat-lbl">재시험 비율</div><div className="stat-val orange">{retakePct}%</div></div>
          <div className="stat-card"><div className="stat-lbl">활성 학생</div><div className="stat-val green">{[...new Set(records.map(r=>r.studentId))].length}</div></div>
        </div>
        <div className="g2" style={{marginBottom:18}}>
          <div className="card"><div className="ci">
            <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>월별 시험 횟수 & 평균 정답률</h3>
            <LineChart labels={months.map(m=>m.label)} datasets={[{label:'평균 정답률(%)',data:months.map(m=>m.avg),color:'#007AFF'},{label:'시험 횟수',data:months.map(m=>m.cnt),color:'#34C759'}]} height={200}/>
          </div></div>
          <div className="card"><div className="ci">
            <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>학생별 평균 정답률 비교</h3>
            <BarChart labels={studentCompar.map(s=>s.name)} data={studentCompar.map(s=>s.avg)} color='#5856D6' height={200}/>
          </div></div>
        </div>
        <div className="g2">
          <div className="card"><div className="ci">
            <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>시험 유형별 평균 정답률</h3>
            {typeE.length>0?<BarChart labels={typeE.map(e=>e[0])} data={typeE.map(([,a])=>avg(a))} color='#FF9500' height={190}/>:<div className="empty"><div className="empty-txt">데이터 없음</div></div>}
          </div></div>
          <div className="card"><div className="ci">
            <h3 style={{fontSize:14,fontWeight:600,marginBottom:14}}>오답 유형 분포</h3>
            {errE.length>0?<Doughnut labels={errE.map(e=>e[0])} data={errE.map(e=>e[1])} colors={['#FF3B30','#FF9500','#007AFF']} height={190}/>:<div className="empty"><div className="empty-txt">오답 유형 데이터 없음</div></div>}
          </div></div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ 학부모 리포트 ═══════════════

function ParentReport({ students, records, papers }) {
  const [selId,setSelId] = useState('');
  const student=students.find(s=>s.id===selId);
  const recs=[...records.filter(r=>r.studentId===selId)].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const accs=recs.map(r=>{const p=papers.find(x=>x.id===r.paperId)||{total:15};return calcAcc(r.score,p.total)});
  const avgA=avg(accs);
  const unitMap={};recs.forEach(r=>{const p=papers.find(x=>x.id===r.paperId);if(!p)return;const u=p.unit;if(!unitMap[u])unitMap[u]=[];unitMap[u].push(calcAcc(r.score,p.total))});
  const weakU=Object.entries(unitMap).map(([u,a])=>({unit:u,avg:avg(a)})).sort((a,b)=>a.avg-b.avg).slice(0,3);
  const genComment=()=>{if(!student||!recs.length)return '';if(avgA>=90)return`${student.name} 학생은 전반적으로 매우 우수한 성취를 보이고 있습니다. 현재 페이스를 유지하며 심화 학습을 권장합니다.`;if(avgA>=75)return`${student.name} 학생은 꾸준한 실력 향상을 보이고 있습니다. ${weakU[0]?.unit||'취약 단원'} 부분을 집중 보완한다면 더 좋은 결과를 기대할 수 있습니다.`;if(avgA>=60)return`${student.name} 학생은 기초 개념 이해에 노력하고 있습니다. ${weakU.map(w=>w.unit).join(', ')} 단원의 반복 학습이 필요합니다.`;return`${student.name} 학생은 기초 개념부터 체계적인 학습이 필요한 상태입니다. 가정에서의 적극적인 관심과 지도를 부탁드립니다.`};

  return (
    <div>
      <div className="ph"><div className="pt">학부모 리포트</div><div className="ps">개인 성적 리포트 생성 및 인쇄</div></div>
      <div className="pb">
        <div style={{maxWidth:700}}>
          <div className="card" style={{marginBottom:18}}><div className="ci">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{flex:1}}>
                <label className="fl">학생 선택</label>
                <select className="fi fi-sel" value={selId} onChange={e=>setSelId(e.target.value)}>
                  <option value=''>학생을 선택하세요</option>
                  {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.id}) · {s.grade}</option>)}
                </select>
              </div>
              {student&&<button className="btn btn-primary" style={{marginTop:18,flexShrink:0}} onClick={()=>window.print()}>🖨 인쇄/PDF</button>}
            </div>
          </div></div>

          {student&&recs.length>0&&(
            <div className="card">
              <div className="ci">
                <div style={{textAlign:'center',paddingBottom:22,borderBottom:'2px solid var(--border)',marginBottom:22}}>
                  <div style={{fontSize:11,color:'var(--text2)',letterSpacing:2,textTransform:'uppercase',marginBottom:6}}>15Q20M · 학원 성적 리포트</div>
                  <h1 style={{fontSize:26,fontWeight:700,letterSpacing:-.8}}>{student.name} 학생 성적 리포트</h1>
                  <p style={{color:'var(--text2)',marginTop:5,fontSize:13}}>{student.grade} · {student.school} · 발행일: {new Date().toLocaleDateString('ko-KR')}</p>
                </div>
                <div className="stat-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:22}}>
                  <div className="stat-card"><div className="stat-lbl">총 시험 횟수</div><div className="stat-val blue">{recs.length}회</div></div>
                  <div className="stat-card"><div className="stat-lbl">평균 정답률</div><div className="stat-val" style={{color:avgA>=80?'var(--green)':avgA>=60?'var(--orange)':'var(--red)'}}>{avgA}%</div></div>
                  <div className="stat-card"><div className="stat-lbl">최근 시험</div><div className="stat-val" style={{fontSize:18}}>{recs[0].date}</div></div>
                </div>
                <h3 style={{fontSize:14,fontWeight:600,marginBottom:10}}>최근 시험 기록</h3>
                <div className="tw" style={{marginBottom:22}}>
                  <table><thead><tr><th>날짜</th><th>시험지</th><th>점수</th><th>정답률</th><th>오답유형</th></tr></thead>
                  <tbody>{recs.slice(0,5).map(r=>{const p=papers.find(x=>x.id===r.paperId)||{name:'?',total:15};const ac=calcAcc(r.score,p.total);return<tr key={r.id}><td>{r.date}</td><td>{p.name}</td><td><strong>{r.score}</strong>/{p.total}</td><td style={{color:ac>=80?'var(--green)':ac>=60?'var(--orange)':'var(--red)',fontWeight:600}}>{ac}%</td><td>{r.errorType||'-'}</td></tr>})}</tbody>
                  </table>
                </div>
                {weakU.length>0&&<>
                  <h3 style={{fontSize:14,fontWeight:600,marginBottom:10}}>보완이 필요한 단원</h3>
                  <div style={{marginBottom:20}}>{weakU.map(u=>(
                    <div key={u.unit} style={{display:'flex',alignItems:'center',gap:10,marginBottom:9}}>
                      <span style={{width:72,fontSize:12,fontWeight:500}}>{u.unit}</span>
                      <div className="sco-bar" style={{flex:1}}><div className="sco-fill" style={{width:u.avg+'%',background:u.avg>=80?'var(--green)':u.avg>=60?'var(--orange)':'var(--red)'}}/></div>
                      <span style={{width:36,textAlign:'right',fontWeight:600,color:u.avg>=80?'var(--green)':u.avg>=60?'var(--orange)':'var(--red)',fontSize:12}}>{u.avg}%</span>
                    </div>
                  ))}</div>
                </>}
                <div style={{background:'var(--blue-light)',borderRadius:12,padding:18,marginBottom:14}}>
                  <h3 style={{fontSize:13,fontWeight:600,color:'var(--blue)',marginBottom:7}}>📝 학습 코멘트</h3>
                  <p style={{fontSize:13.5,lineHeight:1.7}}>{genComment()}</p>
                </div>
                {student.memo&&<div style={{marginTop:14,background:'var(--bg)',borderRadius:11,padding:14}}>
                  <h3 style={{fontSize:13,fontWeight:600,marginBottom:5}}>교사 메모</h3>
                  <p style={{fontSize:13,lineHeight:1.7,color:'var(--text2)'}}>{student.memo}</p>
                </div>}
                <div style={{textAlign:'center',marginTop:24,paddingTop:18,borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text3)'}}>본 리포트는 15Q20M 학원 시험 관리 시스템에서 자동 생성되었습니다.</div>
              </div>
            </div>
          )}
          {student&&recs.length===0&&<div className="card"><div className="ci"><div className="empty"><div className="empty-ico">📋</div><div className="empty-txt">시험 기록이 없습니다</div></div></div></div>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════ 메인 앱 ═══════════════

function App() {
  const [students,setStudents] = useLS('15q_students_v3', INIT_STUDENTS);
  const [papers,setPapers] = useLS('15q_papers_v3', INIT_PAPERS);
  const [records,setRecords] = useLS('15q_records_v3', INIT_RECORDS);
  const [assignments,setAssignments] = useLS('15q_assignments_v3', INIT_ASSIGNMENTS);
  const [mode,setMode] = useState('login'); // login | student | admin
  const [curStudent,setCurStudent] = useState(null);
  const [page,setPage] = useState('dashboard');
  const [selStudent,setSelStudent] = useState(null);

  const onStudentLogin = s => { setCurStudent(s); setMode('student'); };
  const onAdminLogin = () => { setMode('admin'); setPage('dashboard'); };
  const onLogout = () => { setMode('login'); setCurStudent(null); };

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    if(params.get('autoAdmin')==='1') {
      onAdminLogin();
      return;
    }
    const pin = params.get('autoStudent');
    if(pin) {
      const found = students.find(s => s.id === pin);
      if(found) onStudentLogin(found);
    }
  },[students]);

  const addRecord = (rec, assignId) => {
    setRecords(r=>[...r,rec]);
    if(assignId) setAssignments(a=>a.map(x=>x.id===assignId?{...x,used:true}:x));
  };
  const delRecord = id => setRecords(r=>r.filter(x=>x.id!==id));
  const addStudent = s => setStudents(ss=>[...ss,s]);
  const addBulkStudents = list => setStudents(ss=>[...ss,...list]);
  const delStudent = id => setStudents(ss=>ss.filter(s=>s.id!==id));
  const addPaper = p => setPapers(pp=>[...pp,p]);
  const delPaper = id => setPapers(pp=>pp.filter(p=>p.id!==id));
  const updatePaper = p => setPapers(pp=>pp.map(x=>x.id===p.id?p:x));
  const addAssign = a => setAssignments(aa=>[...aa,a]);
  const delAssign = id => setAssignments(aa=>aa.filter(a=>a.id!==id));
  const updateMemo = (id,memo) => setStudents(ss=>ss.map(s=>s.id===id?{...s,memo}:s));

  if(mode==='login') return <LoginPage students={students} onStudent={onStudentLogin} onAdmin={onAdminLogin}/>;
  if(mode==='student') return <StudentExam student={curStudent} assignments={assignments} papers={papers} onSave={addRecord} onLogout={onLogout}/>;

  // 관리자
  const renderPage = () => {
    if(page==='studentDetail'&&selStudent) return <StudentDetail student={selStudent} records={records} papers={papers} onBack={()=>setPage('students')} onUpdateMemo={updateMemo}/>;
    switch(page) {
      case 'dashboard': return <Dashboard students={students} records={records} papers={papers} assignments={assignments} onNav={setPage}/>;
      case 'assign': return <AssignPage students={students} papers={papers} assignments={assignments} onAdd={addAssign} onDelete={delAssign}/>;
      case 'students': return <StudentList students={students} records={records} papers={papers} onSelect={s=>{setSelStudent(s);setPage('studentDetail')}} onAdd={addStudent} onAddBulk={addBulkStudents} onDelete={delStudent}/>;
      case 'entry': return <TestEntry students={students} papers={papers} onSave={addRecord}/>;
      case 'records': return <RecordsPage records={records} students={students} papers={papers} onDelete={delRecord} onExport={()=>exportCSV(records,students,papers)}/>;
      case 'papers': return <PaperMgmt papers={papers} records={records} onAdd={addPaper} onDelete={delPaper} onUpdate={updatePaper}/>;
      case 'analytics': return <Analytics students={students} records={records} papers={papers}/>;
      case 'report': return <ParentReport students={students} records={records} papers={papers}/>;
      default: return <Dashboard students={students} records={records} papers={papers} assignments={assignments} onNav={setPage}/>;
    }
  };

  return (
    <div className="app">
      <Sidebar page={page} onChange={p=>{setPage(p);setSelStudent(null)}} onLogout={onLogout}
        counts={{s:students.length,r:records.length,a:assignments.filter(a=>!a.used).length}}/>
      <main className="main">{renderPage()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
